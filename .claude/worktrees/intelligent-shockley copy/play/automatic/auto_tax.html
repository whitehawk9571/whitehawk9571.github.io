<!doctype html>
<html>
<head>
	<title>Yard Sale - Wealth Tax</title>
	<link href="automatic.css" rel="stylesheet" type="text/css">
</head>
<body>
	<div id="container">
		<div id="main_area">
			<canvas id="canvas" width="600" height="500"></canvas>
		</div>
		<div id="stats">
			<canvas id="stats_canvas" width="400" height="220"></canvas>
			<div id="stats_text"></div>
			<div>
				<div class="btn" id="moving" onclick="START_SIM=!START_SIM; updateButtons()">&#x25B6; play</div>
				<div class="btn" id="reset_btn" onclick="reset()">&#x21BB; reset</div>
			</div>
			<div id="controls">
				<div class="slider-row">
					<label>Wealth tax:</label>
					<input type="range" id="sl_tax" min="0" max="50" value="0" oninput="updateTax()">
					<span class="val" id="val_tax">0%</span>
				</div>
			</div>
			<div id="info_text" style="margin-top:12px">
				What if every round, everyone pays a tiny <b style="color:#ddd">wealth tax</b>,<br>
				and the revenue is split equally?<br>
				Try adding even a small tax...
			</div>
		</div>
	</div>
</body>
</html>

<script>
window.SIM_CONFIG = { numPeople: 50, wealthTax: 0 };
</script>
<script src="../lib/Mouse.js"></script>
<script src="automatic.js"></script>
<script>
SPEED = 5;

function updateTax() {
	var taxVal = parseInt(document.getElementById("sl_tax").value);
	WEALTH_TAX = taxVal / 1000;
	document.getElementById("val_tax").textContent = (WEALTH_TAX * 100).toFixed(1) + "%";
}
</script>
